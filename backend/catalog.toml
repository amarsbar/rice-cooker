# rice-cooker catalog — one file, keyed by rice name.
# Filename stem of each [table] is the CLI id: `rice-cooker install <stem>`.
#
# `commit` MUST be a full hex SHA — no branch names, no "HEAD". Pinning is
# what lets us reproduce the install and hash the rice's intended state.
# When upgrading a rice, bump `commit` (and any fields that depend on it).
#
# `shape` determines the deploy path:
#   - "symlink": the repo IS the shell config. One `ln -sfnT <clone>/<src>
#     <dst>`, no install script. Fast, no snapshot, trivial to uninstall.
#   - "dotfiles": the rice ships an install script that copies a config
#     tree into $HOME. Pre/post snapshot the watched roots so uninstall
#     can reverse what it deployed.
#
# `commit` values below are placeholders pinned during v2 curation; bump
# them when upgrading a rice.

[caelestia]
display_name = "Caelestia"
description = "Segsy Quickshell rice with install.fish"
repo = "https://github.com/caelestia-dots/caelestia"
commit = "0000000000000000000000000000000000000001"
shape = "dotfiles"
install_cmd = "./install.fish --noconfirm --aur-helper=paru"
partial_ownership = ["~/.zshrc", "~/.bashrc", "~/.config/mimeapps.list"]
runtime_regenerated = [
  "~/.config/gtk-3.0/settings.ini",
  "~/.config/gtk-3.0/colors.css",
  "~/.config/gtk-4.0/settings.ini",
  "~/.config/qt5ct/qt5ct.conf",
]
documented_system_effects = [
  "installs caelestia-meta from AUR (via install.fish → paru)",
]

[noctalia]
display_name = "Noctalia"
description = "Minimal dark Quickshell"
repo = "https://github.com/noctalia-dev/noctalia-shell"
commit = "0000000000000000000000000000000000000002"
shape = "symlink"
symlink_src = "."
symlink_dst = "~/.config/quickshell/noctalia"

