# rice-cooker catalog: one file keyed by rice name.
# Filename stem of each [table] is the CLI id: `rice-cooker install <stem>`.
#
# `commit` is any Git ref accepted by `git checkout --detach`:
# branch name (e.g. `commit = "stable"`), tag, full SHA, or short SHA.
#
# You can submit a rice by adding it to the catalog & opening a PR, and/or submitting this form: 
# Rice cooker v0.1 only applies quickshell configs & installs dependencies.
# Preview dependencies are any dependencies that aren't in rice-cooker that the rice would fail to preview without.
# We recommend packaging your rice with nix flakes. Rice cooker will be updated to support them soon.

[noctalia]
display_name = "Noctalia"
creator_name = "noctalia-dev"
repo = "https://github.com/noctalia-dev/noctalia-shell"
commit = "d7b68652e79bce5813dc4fea7e51636a5da3e1b7"
symlink_src = "."
symlink_dst = "~/.config/quickshell/noctalia"
install_deps = [
  "noctalia-shell",
  "cliphist",
  "wlsunset",
  "power-profiles-daemon",
  "ddcutil",
  "wl-clipboard",
  "wtype"
]
preview_deps = ["noctalia-qs"]

