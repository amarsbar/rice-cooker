# rice-cooker catalog: one file keyed by rice name.
# Filename stem of each [table] is the CLI id: `rice-cooker install <stem>`.
#
# `commit` is a hex SHA (min 7 chars, all hex); full 40-char SHAs
# strongly preferred. Placeholder values are rejected on install:
# any commit string containing the literal "PLACEHOLDER" substring
# is treated as a placeholder.
#
# Preview = clone, install `preview_*_deps`, symlink, launch Quickshell.
# Install requires `install_supported = true`.
#
# paru resolves transitive AUR deps; aur_deps lists top-level names only,
# no commit pins.

[caelestia]
display_name = "Caelestia"
creator_name = "soramenew"
description = "Caelestia Quickshell. Ships as caelestia-shell-git AUR."
repo = "https://github.com/caelestia-dots/caelestia"
commit = "0283b44960791ab12cde19c9797d70976a0b96a4"
symlink_src = "."
symlink_dst = "~/.config/quickshell/caelestia"
pacman_deps = [
  "hyprland",
  "xdg-desktop-portal-hyprland",
  "xdg-desktop-portal-gtk",
  "hyprpicker",
  "wl-clipboard",
  "cliphist",
  "wireplumber",
  "trash-cli",
  "foot",
  "fish",
  "jq",
]
aur_deps = ["caelestia-shell-git"]
preview_aur_deps = ["caelestia-shell-git"]

